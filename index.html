<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBack-Up | 채팅 백업 변환기</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <!-- 헤더 -->
  <header id="app-header">
    <h1>📖 ChatBack-Up</h1>
    <p>채팅 백업 txt → epub / html 변환기</p>
  </header>

  <main id="app-main">
    <!-- ========== 좌측 사이드바 ========== -->
    <aside id="sidebar">

      <!-- 1. 파일 업로드 -->
      <section class="panel" id="upload-panel">
        <h2>📄 파일 업로드</h2>
        <div id="drop-zone">
          <p>📁 txt 파일을 드래그하거나<br>클릭하여 선택하세요</p>
          <input type="file" id="file-input" accept=".txt" hidden>
        </div>
        <div id="file-info" class="hidden">
          <span id="file-name"></span>
          <button id="file-clear" title="파일 제거">✕</button>
        </div>
      </section>

      <!-- 2. 메타데이터 -->
      <section class="panel hidden" id="meta-panel">
        <h2>📝 책 정보</h2>
        <label>제목<input type="text" id="meta-title" placeholder="책 제목"></label>
        <label>저자<input type="text" id="meta-author" placeholder="저자명"></label>
        <label>표지 이미지 (선택)
          <input type="file" id="cover-input" accept="image/*">
        </label>
        <div id="cover-preview" class="hidden">
          <img id="cover-img">
          <button id="cover-clear">표지 제거</button>
        </div>
      </section>

      <!-- 3. 챕터 분할 -->
      <section class="panel hidden" id="chapter-panel">
        <h2>📑 챕터 분할</h2>
        <div class="radio-group">
          <label><input type="radio" name="chapter-mode" value="per-turn" checked> 1턴 = 1챕터</label>
          <label><input type="radio" name="chapter-mode" value="group"> N턴씩 묶기</label>
          <label><input type="radio" name="chapter-mode" value="manual"> 직접 지정</label>
        </div>
        <div id="group-size-wrap" class="hidden">
          <label>묶을 턴 수 <input type="number" id="group-size" value="10" min="1" max="999"></label>
        </div>
        <div id="chapter-name-format">
          <label>챕터 이름 형식
            <select id="chapter-format">
              <option value="chapter">Chapter {n}</option>
              <option value="jang">{n}장</option>
              <option value="turn">Turn {from}~{to}</option>
              <option value="custom">직접 입력</option>
            </select>
          </label>
        </div>
        <button id="btn-edit-chapters" class="btn btn-secondary hidden" style="margin-top:8px;">✏️ 챕터 이름 편집</button>
      </section>

      <!-- 4. 서식 변환 -->
      <section class="panel hidden" id="format-panel">
        <h2>✨ 서식 변환</h2>

        <div class="toggle-row">
          <span>*지문* → 이탤릭</span>
          <label class="switch"><input type="checkbox" id="fmt-italic" checked><span class="slider"></span></label>
        </div>

        <label>대사("...") 스타일
          <select id="fmt-dialogue">
            <option value="bold">볼드</option>
            <option value="normal" selected>일반 (따옴표 유지)</option>
            <option value="no-quote">따옴표 제거</option>
            <option value="indent">들여쓰기</option>
          </select>
        </label>

        <div class="toggle-row">
          <span>유저/AI 구분 표시</span>
          <label class="switch"><input type="checkbox" id="fmt-speaker" checked><span class="slider"></span></label>
        </div>

        <div id="speaker-style-wrap">
          <label>유저 라벨 색상 <input type="color" id="style-user-color" value="#2563eb"></label>
          <label>AI 라벨 색상 <input type="color" id="style-ai-color" value="#7c3aed"></label>
        </div>
      </section>

      <!-- 5. HTML 스타일 옵션 -->
      <section class="panel hidden" id="html-style-panel">
        <h2>🎨 HTML 스타일</h2>
        <label>폰트
          <select id="html-font">
            <option value="'Noto Serif KR', serif">노토 세리프 (명조)</option>
            <option value="'Noto Sans KR', sans-serif" selected>노토 산스 (고딕)</option>
            <option value="'Nanum Myeongjo', serif">나눔명조</option>
            <option value="serif">기본 Serif</option>
            <option value="sans-serif">기본 Sans-serif</option>
          </select>
        </label>
        <label>줄간격 <input type="range" id="html-line-height" min="1" max="3" step="0.1" value="1.8">
          <span id="html-lh-val">1.8</span>
        </label>
        <label>여백(px) <input type="number" id="html-padding" value="40" min="0" max="200"></label>
        <label>배경색 <input type="color" id="html-bg" value="#ffffff"></label>
        <label>텍스트 색 <input type="color" id="html-text-color" value="#1a1a1a"></label>
      </section>

      <!-- 6. 내보내기 버튼 -->
      <section class="panel hidden" id="export-panel">
        <h2>💾 내보내기</h2>
        <button id="btn-epub" class="btn btn-primary">📚 epub 다운로드</button>
        <button id="btn-html-download" class="btn btn-secondary">🌐 html 파일 다운로드</button>
        <button id="btn-html-code" class="btn btn-secondary">📋 html 코드 보기</button>
      </section>
    </aside>

    <!-- ========== 우측 미리보기 ========== -->
    <div id="content-area">
      <div id="empty-state">
        <div class="empty-icon">📂</div>
        <h2>txt 파일을 업로드해주세요</h2>
        <p>rofan.ai / caveduck.io 채팅 백업 txt 파일을 지원합니다</p>
      </div>

      <div id="preview-area" class="hidden">
        <div id="preview-header">
          <h2>👀 미리보기</h2>
          <span id="turn-count"></span>
        </div>
        <div id="preview-content"></div>
      </div>

      <!-- HTML 코드 출력 -->
      <div id="code-area" class="hidden">
        <div id="code-header">
          <h2>📋 HTML 코드</h2>
          <button id="btn-copy-code" class="btn btn-small">복사</button>
          <button id="btn-close-code" class="btn btn-small">닫기</button>
        </div>
        <textarea id="code-output" readonly></textarea>
      </div>
    </div>
  </main>

  <!-- 챕터 이름 편집 모달 -->
  <div id="chapter-modal" class="modal-overlay hidden">
    <div class="modal">
      <h2>📑 챕터 이름 편집</h2>
      <div id="chapter-list"></div>
      <div class="modal-buttons">
        <button id="chapter-modal-cancel" class="btn btn-cancel">취소</button>
        <button id="chapter-modal-save" class="btn btn-primary">적용</button>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="hidden"></div>

  <script src="js/parser.js"></script>
  <script src="js/formatter.js"></script>
  <script src="js/epub-builder.js"></script>
  <script src="js/html-builder.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
